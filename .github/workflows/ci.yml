name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight CI run when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  # ── 1. Build + tests on Linux and macOS ──────────────────────────────────
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release --all-targets
        run: cargo build --release --all-targets

      - name: cargo test --release
        run: cargo test --release

      - name: cargo build --release --features feed
        run: cargo build --release --features feed

  # ── 2. Lint with clippy, warnings are errors ─────────────────────────────
  clippy:
    name: clippy -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --release --all-targets --no-deps -- -D warnings

  # ── 3. Docs build (intra-doc links, broken refs are errors) ──────────────
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features

  # ── 4. Security advisory scan ─────────────────────────────────────────────
  # We run `cargo audit` directly rather than via rustsec/audit-check@v2 for
  # two reasons:
  #   1. The action treats informational warnings (e.g. "crate X is now
  #      unmaintained") as failures. Plain `cargo audit` only fails on real
  #      vulnerabilities, which is what we actually want to gate on.
  #   2. The action posts a GitHub Check Run via the API, which fails with
  #      "Resource not accessible by integration" on default-permission
  #      tokens. The direct CLI avoids that whole class of problem.
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        # Default behaviour: fail on vulnerabilities; print but don't fail on
        # informational (unmaintained / unsound / notice) advisories.
        run: cargo audit
